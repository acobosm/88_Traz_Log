<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireOps - Planificador Táctico de Incendios</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Leaflet Draw CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #map {
            height: 100vh;
            width: 100%;
            z-index: 1;
            outline: none;
            background: #0f172a;
        }

        .ui-panel {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(4px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .resource-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        /* Estilo de la etiqueta de nombre */
        .custom-tooltip {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-weight: bold;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            pointer-events: none;
            white-space: nowrap;
        }

        .placement-active #map {
            cursor: crosshair !important;
        }

        @keyframes pulse-orange {
            0% {
                box-shadow: 0 0 0 0 rgba(234, 88, 12, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(234, 88, 12, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(234, 88, 12, 0);
            }
        }

        .pulse-mode {
            animation: pulse-orange 2s infinite;
        }

        button {
            user-select: none;
        }
    </style>
</head>

<body class="bg-gray-900 text-white font-sans antialiased flex">

    <!-- Sidebar -->
    <div class="ui-panel w-80 h-screen flex flex-col shadow-2xl z-[1000] relative" id="sidebar">
        <div class="p-5 border-b border-gray-700 bg-slate-800">
            <h1 class="text-xl font-bold text-orange-500 flex items-center gap-2">
                <i class="fa-solid fa-fire-extinguisher"></i> FIRE-OPS
            </h1>
            <p class="text-xs text-gray-400 mt-1">Simulador Táctico Forestal</p>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-6">
            <!-- Capas -->
            <div>
                <h3 class="text-xs uppercase font-bold text-gray-500 mb-2">Terreno</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="switchLayer('satellite')"
                        class="p-2 text-xs bg-slate-700 hover:bg-slate-600 rounded border border-slate-600 flex items-center justify-center gap-2 transition">
                        <i class="fa-solid fa-earth-americas text-blue-400"></i> SATÉLITE
                    </button>
                    <button onclick="switchLayer('street')"
                        class="p-2 text-xs bg-slate-700 hover:bg-slate-600 rounded border border-slate-600 flex items-center justify-center gap-2 transition">
                        <i class="fa-solid fa-map text-green-400"></i> CALLES
                    </button>
                </div>
            </div>

            <!-- Zonas Operativas -->
            <div>
                <h3 class="text-xs uppercase font-bold text-gray-500 mb-2">Zonas Operativas</h3>
                <div class="space-y-2">
                    <button onclick="startDraw('fire')"
                        class="w-full p-3 bg-red-900/40 hover:bg-red-900/60 border border-red-700/50 rounded flex items-center gap-3 transition">
                        <i class="fa-solid fa-fire text-red-500 w-5"></i> <span>Fuego Activo</span>
                    </button>
                    <button onclick="startDraw('burnt')"
                        class="w-full p-3 bg-gray-800 hover:bg-gray-700 border border-gray-600 rounded flex items-center gap-3 transition">
                        <i class="fa-solid fa-skull text-gray-400 w-5"></i> <span>Zona Quemada</span>
                    </button>
                </div>
            </div>

            <!-- Análisis -->
            <div>
                <h3 class="text-xs uppercase font-bold text-gray-500 mb-2 text-orange-400">Análisis de Incendio Forestal
                </h3>
                <div class="space-y-2">
                    <button onclick="activateMarkerMode('critical')"
                        class="w-full p-3 bg-orange-900/30 hover:bg-orange-900/50 border border-orange-700/50 rounded flex items-center gap-3 transition">
                        <i class="fa-solid fa-crosshairs text-orange-500 w-5"></i> <span>Puntos Críticos</span>
                    </button>
                    <button onclick="startDraw('opportunity')"
                        class="w-full p-3 bg-teal-900/30 hover:bg-teal-900/50 border border-teal-700/50 rounded flex items-center gap-3 transition">
                        <i class="fa-solid fa-draw-polygon text-teal-400 w-5"></i> <span>Zonas de Oportunidad</span>
                    </button>
                </div>
            </div>

            <!-- Recursos -->
            <div>
                <h3 class="text-xs uppercase font-bold text-gray-500 mb-2">Colocar Recursos</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="activateMarkerMode('engine')"
                        class="p-2 bg-slate-700 hover:bg-red-600 rounded text-xs flex flex-col items-center gap-1 transition">
                        <i class="fa-solid fa-truck-droplet text-base"></i> AUTOBOMBA
                    </button>
                    <button onclick="activateMarkerMode('heli')"
                        class="p-2 bg-slate-700 hover:bg-orange-600 rounded text-xs flex flex-col items-center gap-1 transition">
                        <i class="fa-solid fa-helicopter text-base"></i> HELICÓPTERO
                    </button>
                    <button onclick="activateMarkerMode('crew')"
                        class="p-2 bg-slate-700 hover:bg-green-600 rounded text-xs flex flex-col items-center gap-1 transition">
                        <i class="fa-solid fa-users text-base"></i> BRIGADA
                    </button>
                    <button onclick="activateMarkerMode('icp')"
                        class="p-2 bg-slate-700 hover:bg-purple-600 rounded text-xs flex flex-col items-center gap-1 transition">
                        <i class="fa-solid fa-tower-broadcast text-base"></i> PMA
                    </button>
                    <button onclick="activateMarkerMode('water')"
                        class="p-2 bg-slate-700 hover:bg-blue-600 rounded text-xs flex flex-col items-center gap-1 transition">
                        <i class="fa-solid fa-droplet text-base"></i> AGUA
                    </button>
                    <button onclick="activateMarkerMode('hazard')"
                        class="p-2 bg-slate-700 hover:bg-yellow-500 rounded text-xs flex flex-col items-center gap-1 text-white transition">
                        <i class="fa-solid fa-triangle-exclamation text-base"></i> PELIGRO
                    </button>
                </div>
            </div>
        </div>

        <div class="p-4 bg-slate-800 border-t border-gray-700">
            <button onclick="clearMap()"
                class="w-full py-2 bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white border border-red-600/50 rounded text-sm transition">
                <i class="fa-solid fa-trash-can mr-2"></i> LIMPIAR TODO
            </button>
            <div class="mt-2 text-center text-[10px] text-gray-500 uppercase tracking-widest" id="status-text">LISTO
            </div>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Indicator -->
    <div id="mode-indicator"
        class="fixed top-6 left-1/2 -translate-x-1/2 bg-orange-600 text-white px-8 py-3 rounded-full font-bold shadow-2xl z-[2000] hidden pulse-mode border-2 border-white/20">
        <div class="flex items-center gap-4">
            <span id="mode-name">SELECCIONADO</span>
            <span class="text-[10px] bg-black/30 px-2 py-1 rounded">ESC para cancelar</span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <script>
        // Inicialización del Mapa
        const map = L.map('map', { zoomControl: false }).setView([-0.1807, -78.4678], 14);
        L.control.zoom({ position: 'topright' }).addTo(map);

        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' }).addTo(map);
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });

        const drawnItems = new L.FeatureGroup().addTo(map);
        let activeDrawHandler = null;
        let markerModeType = null;

        function switchLayer(type) {
            if (type === 'satellite') { map.removeLayer(osmLayer); satelliteLayer.addTo(map); }
            else { map.removeLayer(satelliteLayer); osmLayer.addTo(map); }
        }

        // Activar modo colocación de marcadores
        function activateMarkerMode(type) {
            cancelAllModes();
            markerModeType = type;
            document.body.classList.add('placement-active');

            const names = {
                'engine': 'AUTOBOMBA', 'heli': 'HELICÓPTERO', 'crew': 'BRIGADA',
                'icp': 'PMA', 'water': 'AGUA', 'hazard': 'PELIGRO',
                'critical': 'PUNTO CRÍTICO'
            };
            showIndicator("COLOCAR: " + names[type]);
            document.getElementById('status-text').innerText = "CLIC EN MAPA PARA FIJAR";
        }

        // Evento de clic en el mapa para soltar recurso puntual
        map.on('click', function (e) {
            if (!markerModeType) return;
            createResourceMarker(e.latlng, markerModeType);
            cancelAllModes();
        });

        function createResourceMarker(latlng, type) {
            let config = { color: 'bg-blue-600', icon: 'fa-question', label: 'Nuevo Recurso' };
            switch (type) {
                case 'engine': config = { color: 'bg-red-600', icon: 'fa-truck-droplet', label: 'BOMBA' }; break;
                case 'heli': config = { color: 'bg-orange-500', icon: 'fa-helicopter', label: 'HELI' }; break;
                case 'crew': config = { color: 'bg-green-600', icon: 'fa-users', label: 'BRIGADA' }; break;
                case 'icp': config = { color: 'bg-purple-700', icon: 'fa-tower-broadcast', label: 'PMA' }; break;
                case 'water': config = { color: 'bg-blue-500', icon: 'fa-droplet', label: 'AGUA' }; break;
                case 'hazard': config = { color: 'bg-yellow-400 text-black', icon: 'fa-triangle-exclamation', label: 'PELIGRO' }; break;
                case 'critical': config = { color: 'bg-orange-600', icon: 'fa-crosshairs', label: 'P. CRÍTICO' }; break;
            }

            const icon = L.divIcon({
                className: 'marker-container',
                html: `<div class="resource-icon ${config.color} text-white" style="width:36px; height:36px; font-size: 18px;">
                         <i class="fa-solid ${config.icon}"></i>
                       </div>`,
                iconSize: [36, 36],
                iconAnchor: [18, 18]
            });

            const marker = L.marker(latlng, { icon: icon }).addTo(drawnItems);

            setupEditableLabel(marker, config.label);
        }

        // Configuración común de etiquetas editables para Marcadores y Polígonos
        function setupEditableLabel(layer, initialLabel) {
            const layerId = L.stamp(layer);

            // Etiqueta permanente
            layer.bindTooltip(initialLabel, {
                permanent: true,
                direction: 'bottom',
                className: 'custom-tooltip',
                offset: layer instanceof L.Marker ? [0, 10] : [0, 0]
            });

            // Popup de edición
            const popupContent = document.createElement('div');
            popupContent.className = "p-2 min-w-[150px]";
            popupContent.innerHTML = `
                <div class="text-xs font-bold text-gray-500 uppercase mb-2">Editar Nombre</div>
                <input type="text" id="input-${layerId}" value="${initialLabel}" 
                    class="w-full p-1 text-sm border border-gray-300 rounded mb-3 text-black focus:outline-none focus:border-orange-500" 
                    placeholder="Nombre..." />
                <div class="flex gap-2">
                    <button class="flex-1 bg-slate-700 text-white text-[10px] py-1 rounded font-bold hover:bg-slate-800" 
                        onclick="saveLayerName(${layerId})">GUARDAR</button>
                    <button class="bg-red-600 text-white text-[10px] px-2 py-1 rounded font-bold hover:bg-red-700" 
                        onclick="drawnItems.removeLayer(${layerId})"><i class="fa-solid fa-trash"></i></button>
                </div>
            `;

            layer.bindPopup(popupContent);
        }

        // Función global para guardar el nombre (Marcadores y Polígonos)
        window.saveLayerName = function (id) {
            const input = document.getElementById(input - ${ id });
            const layer = drawnItems.getLayer(id);
            if (layer && input) {
                layer.setTooltipContent(input.value.toUpperCase());
                layer.closePopup();
                document.getElementById('status-text').innerText = "ACTUALIZADO";
            }
        };

        // Dibujo de Polígonos (Fuego, Quemado, Oportunidad)
        function startDraw(type) {
            cancelAllModes();
            const options = {
                'fire': {
                    color: '#ef4444',
                    fillColor: '#ef4444',
                    fillOpacity: 0.4,
                    weight: 3
                },
                'burnt': {
                    color: '#334155',
                    fillColor: '#0f172a',
                    fillOpacity: 0.6,
                    weight: 2
                },
                'opportunity': {
                    color: '#14b8a6',
                    fillColor: '#14b8a6',
                    fillOpacity: 0.3,
                    weight: 3,
                    dashArray: '5, 8'
                }
            };

            const labels = {
                'fire': 'ZONA DE FUEGO',
                'burnt': 'ZONA QUEMADA',
                'opportunity': 'ZONA OPORTUNIDAD'
            };

            // Guardamos el tipo actual para la etiqueta inicial en el evento CREATED
            map._activeDrawTypeLabel = labels[type];

            activeDrawHandler = new L.Draw.Polygon(map, { shapeOptions: options[type] });
            activeDrawHandler.enable();
            showIndicator("DIBUJANDO: " + labels[type]);
            document.getElementById('status-text').innerText = "DIBUJA EL POLÍGONO EN EL MAPA";
        }

        map.on(L.Draw.Event.CREATED, function (e) {
            const layer = e.layer;
            layer.addTo(drawnItems);

            // Aplicar lógica editable al nuevo polígono
            const initialLabel = map._activeDrawTypeLabel || 'NUEVA ÁREA';
            setupEditableLabel(layer, initialLabel);

            cancelAllModes();
        });

        // Gestión de Estados e Interfaz
        function cancelAllModes() {
            if (activeDrawHandler) activeDrawHandler.disable();
            activeDrawHandler = null;
            markerModeType = null;
            document.body.classList.remove('placement-active');
            hideIndicator();
            document.getElementById('status-text').innerText = "LISTO";
        }

        function showIndicator(name) {
            document.getElementById('mode-indicator').classList.remove('hidden');
            document.getElementById('mode-name').innerText = name;
        }

        function hideIndicator() { document.getElementById('mode-indicator').classList.add('hidden'); }

        function clearMap() { if (confirm("¿Estás seguro de borrar todo el plan operativo?")) drawnItems.clearLayers(); }

        document.addEventListener('keydown', (e) => { if (e.key === "Escape") cancelAllModes(); });

        map.locate({ setView: true, maxZoom: 14 });
    </script>
</body>

</html>
